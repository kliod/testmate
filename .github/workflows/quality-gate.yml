name: Quality Gate

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci
        continue-on-error: false

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests
        run: npm run test:unit --if-present

      - name: TestMate Tier 2 (Integrity)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TESTMATE_REQUIRE_API_KEY: "false"
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            if [ "$TESTMATE_REQUIRE_API_KEY" = "true" ]; then
              echo "Failing quality gate: OPENAI_API_KEY is not configured"
              exit 1
            fi
            echo "Skipping AI check: OPENAI_API_KEY not configured and TESTMATE_REQUIRE_API_KEY=false"
            exit 0
          fi
          node .testmate/testmate.mjs tier-2-impact
